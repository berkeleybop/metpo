# zizmor configuration. https://docs.zizmor.sh/configuration/
#
# qc.yml is generated by the ODK (its header reads "# Basic ODK workflow") and is
# rewritten by `sh run.sh make update_repo`, so hardening applied to it would not
# survive the next ODK upgrade. zizmor therefore skips it; the gaps it would flag
# (SHA-pinned actions, a least-privilege permissions block, persist-credentials)
# are tracked as issues instead of silently dropped. See berkeleybop/metpo#508.
rules:
  unpinned-uses:
    ignore:
      - qc.yml
  excessive-permissions:
    ignore:
      - qc.yml
  artipacked:
    ignore:
      - qc.yml
