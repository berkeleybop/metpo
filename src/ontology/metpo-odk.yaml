id: metpo
title: "Microbial Ecophysiological Trait and Phenotype Ontology"
description: "METPO provides terms for microbial ecophysiological traits and phenotypes: growth preferences (temperature, pH, salinity, oxygen), metabolism, and cell morphology of bacteria and archaea. Its primary purpose is to harmonize terminology across major microbial trait databases (BacDive, BactoTraits, Madin bacteria_archaea_traits, MetaTraits) for use in KG-Microbe. METPO uses OBO-style annotation patterns (IAO textual definitions, oboInOwl synonyms) and cites terms from OMP, MicrO, GO, ECOCORE, and PATO as definition sources."
git_main_branch: main
github_org: berkeleybop
repo: metpo
contact: MAM@lbl.gov
creators:
  - "Mark Andrew Miller"
contributors:
  - "Marcin P. Joachimiak"
  - "Christopher J. Mungall"
license: https://creativecommons.org/licenses/by/4.0/
release_artefacts:
  - base
  - full
primary_release: full
public_release: none
release_diff: true
export_formats:
  - owl
  - obo
  - json
robot_java_args: '-Xmx8G'
use_robot_templates: TRUE
robot_template_directory: src/templates
create_obo_metadata: FALSE
export_project_yaml: true
components:
  products:
    - filename: metpo_sheet.owl
      use_template: TRUE
      templates:
        - metpo_sheet.tsv
      template_options: "--add-prefix 'METPO: https://w3id.org/metpo/'"
